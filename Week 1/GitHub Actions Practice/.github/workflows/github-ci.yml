# TODO-STEP 1: Define the Workflow Name
name: Python CI/CD Pipeline

# TODO-STEP 2: Define the Trigger Events
on:
  push:
    # Chỉnh sửa: Thêm cả master và main để đảm bảo kích hoạt đúng nhánh
    branches: [ main, master ]  
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Cho phép bấm nút chạy thủ công từ tab Actions

# Basic Task 3: Define environment variables
env:
  APP_VERSION: "1.2.3"
  DEPLOY_ENVIRONMENT: "staging"

jobs:
  # TODO-STEP 3: Create the "Build" Job
  build:
    runs-on: ubuntu-latest  
    steps:
    - uses: actions/checkout@v2  
    - name: Set up Python
      uses: actions/setup-python@v2  
      with:
        python-version: 3.9  
    - name: Install dependencies
      run: |
        echo "Installing dependencies..."
        pip install -r requirements.txt

  # TODO-STEP 4: Create the "Test" Job
  test:
    needs: build  # Job này phải đợi Job build chạy xong thành công
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2  
    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: 3.9
    - name: Install dependencies
      run: pip install -r requirements.txt  
    - name: Run tests
      run: pytest  

  # Basic Task 1: Conditional Job Execution (Chỉ chạy khi có Pull Request)
  check_pr_title_and_info:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'  
    steps:
    - uses: actions/checkout@v2
    - name: Check Pull Request Title
      run: |
        PR_TITLE="${{ github.event.pull_request.title }}"
        echo "Checking PR title: $PR_TITLE"
        if [[ $PR_TITLE == *"WIP"* ]]; then
          echo "This is a 'Work in Progress' Pull Request!"
        elif [[ $PR_TITLE == *"URGENT"* ]]; then
          echo "This Pull Request is marked as URGENT!"
        else
          echo "This is a regular Pull Request..."
        fi

  # Basic Task 2: Manual Job Execution (Chỉ chạy khi bấm nút thủ công)
  manual_job:
    needs: [build, test]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'  
    steps:
    - name: Manual step to trigger deployment
      run: echo "This job is triggered manually. Deploying application..."

  # Basic Task 3: Use Variables
  version_info_job:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: 3.9
    - name: Display version info
      run: |
        echo "Running tests for ${{ github.repository }}"
        echo "Current branch- ${{ github.ref_name }}"
        echo "Python version- $(python --version)"
        echo "App version- ${{ env.APP_VERSION }}"
        echo "Environment- ${{ env.DEPLOY_ENVIRONMENT }}"
